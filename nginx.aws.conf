events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 50M;
    server_tokens off;

    upstream labbi_web {
        server web:8080;
    }

    # Die Go-App nutzt X-Real-IP fuer das Kontakt-Rate-Limiting. Ohne
    # Trusted-Proxy-Kette werden eingehende Forwarded-Header ueberschrieben.

    server {
        listen 80;
        server_name labbi-welpen.de www.labbi-welpen.de labbi-hobby.de www.labbi-hobby.de;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://labbi-welpen.de$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name labbi-welpen.de;

        ssl_certificate     /etc/letsencrypt/live/labbi-sites/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/labbi-sites/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location /static/ {
            alias /var/www/static/;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public, max-age=604800" always;
        }

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            try_files $uri =404;
        }

        location = /robots.txt {
            proxy_pass http://labbi_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /sitemap.xml {
            proxy_pass http://labbi_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://labbi_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 443 ssl;
        server_name www.labbi-welpen.de labbi-hobby.de www.labbi-hobby.de;

        ssl_certificate     /etc/letsencrypt/live/labbi-sites/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/labbi-sites/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://labbi-welpen.de$request_uri;
        }
    }
}
