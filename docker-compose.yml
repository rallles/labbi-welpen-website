services:
  neo4j:
    image: neo4j:5.26.1-community
    container_name: neo4jLabbi
    environment:
      NEO4J_AUTH: ${NEO4J_USER:?NEO4J_USER is required}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      LABBI_NEO4J_USER: ${NEO4J_USER:?NEO4J_USER is required}
      LABBI_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j_data:/data
    networks:
      - labbi-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u \"$${LABBI_NEO4J_USER}\" -p \"$${LABBI_NEO4J_PASSWORD}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labbi-web
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:?NEO4J_USER is required}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      SERVER_ADDRESS: 0.0.0.0:8080
      UPLOAD_DIR: /app/data/uploads
      STATIC_DIR: /app/static
      TEMPLATE_DIR: /app/templates
      ADMIN_USER: ${ADMIN_USER:?ADMIN_USER is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      CONTACT_MAIL_TO: ${CONTACT_MAIL_TO:-}
    expose:
      - "8080"
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - labbi-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  nginx:
    image: nginx:1.27.4-alpine
    container_name: labbi-nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - labbi-net

volumes:
  neo4j_data:
  uploads:

networks:
  labbi-net:
    driver: bridge
