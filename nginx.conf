events {}

# Legacy fallback only. Docker Compose uses nginx.local.conf locally and
# nginx.aws.conf on AWS; production must not mount this file.

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream labbi_web {
        server web:8080;
    }

    # Die Go-App nutzt X-Real-IP fuer das Kontakt-Rate-Limiting. Ohne
    # Trusted-Proxy-Kette werden eingehende Forwarded-Header ueberschrieben.

    server {
        listen 80;
        server_name localhost labbi-welpen.de www.labbi-welpen.de;

        client_max_body_size 50M;

        location /static/ {
            alias /var/www/static/;
            access_log off;
            expires 7d;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            access_log off;
            expires 7d;
        }

        location / {
            proxy_pass http://labbi_web;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto http;
        }
    }
}
