events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 25M;
    server_tokens off;

    upstream labbi_app {
        server labbi-web:8080;
    }

    server {
        listen 80;
        server_name labbi-welpen.de www.labbi-welpen.de labbi-hobby.de www.labbi-hobby.de;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name labbi-welpen.de;

        ssl_certificate     /etc/letsencrypt/live/labbi-welpen.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/labbi-welpen.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location /static/ {
            alias /var/www/static/;
            access_log off;
            expires 30d;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            access_log off;
            expires 7d;
        }

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            proxy_pass         http://labbi_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name www.labbi-welpen.de;

        ssl_certificate     /etc/letsencrypt/live/www.labbi-welpen.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.labbi-welpen.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
