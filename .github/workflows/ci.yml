name: CI

on:
  push:
  pull_request:

jobs:
  go-and-compose:
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.local.yml
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci_neo4j_password
      ADMIN_USER: admin
      ADMIN_PASSWORD: ci_admin_password
      SMTP_HOST: smtp.invalid
      SMTP_PORT: "587"
      SMTP_USER: sender@example.invalid
      SMTP_PASSWORD: ci_smtp_password
      CONTACT_MAIL_TO: contact@example.invalid

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"
          if [ -n "$unformatted" ]; then
            echo "The following Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Validate Docker Compose config
        run: docker compose config >/dev/null
