{{ define "base.html" }}
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}Labrador Retriever Welpen{{ end }}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <link rel="stylesheet" href="/static/css/footer.css">
  <link rel="icon" type="image/x-icon" href="/static/images/Favicon.ico">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <header class="top-nav">
    <div class="nav-container">
      <div class="nav-icon">
        <a href="/"><img src="/static/images/labbi3.svg" alt="Labbi-App Logo" class="logo"></a>
      </div>
      <nav class="nav-links" id="primary-navigation">
        <a href="/">Startseite</a>
        <a href="/about">Über uns</a>
        <a href="/dogs">Unsere Hunde</a>
        <a href="/puppies">Welpen</a>
        <a href="/contact">Kontakt</a>
        <a href="/impressum">Impressum</a>
        <a href="/datenschutz">Datenschutz</a>
      </nav>
      <button class="hamburger" type="button" aria-controls="primary-navigation" aria-expanded="false" aria-label="Menü öffnen" onclick="toggleMobileMenu(this)">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="container main-wrapper">
    <main class="content">
      {{ block "content" . }}{{ end }}
    </main>
  </div>

  <footer class="footer-nav">
    <div class="container">
      <nav class="footer-links">
        <a href="/contact">Kontakt</a>
        <a href="/impressum">Impressum</a>
        <a href="/datenschutz">Datenschutz</a>
        <a href="https://www.facebook.com" target="_blank" rel="noopener">Facebook</a>
        <a href="https://www.instagram.com/labbi_welpe/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.deine-tierwelt.de/kleinanzeigen/reinrassige-labradorwelpen-a86329517/" target="_blank" rel="noopener">Deine Tierwelt</a>
      </nav>
    </div>
  </footer>

  <script>
    function toggleMobileMenu(button) {
      var isOpen = document.body.classList.toggle('mobile-menu-open');
      if (button) {
        button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        button.setAttribute('aria-label', isOpen ? 'Menü schließen' : 'Menü öffnen');
      }
    }
  </script>
</body>
</html>
{{ end }}
